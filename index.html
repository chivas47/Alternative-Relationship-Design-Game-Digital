<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relationship Design Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💜 <span class="title-text">Relationship Design Game</span></h1>
            <p>350 cards to explore your values, desires, and boundaries</p>
        </div>

        <div class="card-container" id="gameContainer">
            <div class="progress" id="progress"></div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div id="categoryTag"></div>
            <div class="question" id="question"></div>
            <div class="buttons">
                <button class="btn-yes" onclick="answer('yes')">✓ Yes</button>
                <button class="btn-no" onclick="answer('no')">✗ No</button>
                <button class="btn-discuss" onclick="answer('discuss')">💬 We need to talk about it</button>
            </div>
            <div class="nav-buttons">
                <button class="btn-secondary" onclick="previousCard()">← Previous</button>
                <button class="btn-secondary" onclick="nextCard()">Next →</button>
                <button class="btn-secondary" onclick="randomCard()">🎲 Random</button>
                <button class="btn-secondary" onclick="showReview()">📋 Review</button>
            </div>
            <div class="jump-to">
                <input type="number" id="jumpInput" min="1" max="300" placeholder="Jump to card #">
                <button class="btn-secondary" onclick="jumpToCard()">Go</button>
            </div>
        </div>

        <div class="card-container review-container" id="reviewContainer">
            <h2>Your Responses</h2>
            <div class="stats" id="stats"></div>
            <div class="filter-buttons" id="filterButtons"></div>
            <div id="reviewList"></div>
            <div class="review-actions">
                <button class="btn-secondary" onclick="backToGame()">← Back to Game</button>
                <button class="btn-export" onclick="exportAnswers()">⬇ Export Answers</button>
                <button class="btn-import" onclick="document.getElementById('importInput').click()">⬆ Import Answers</button>
                <input type="file" id="importInput" accept=".json" style="display:none" onchange="importAnswers(event)">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
